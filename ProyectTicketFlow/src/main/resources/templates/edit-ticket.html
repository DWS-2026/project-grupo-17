<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Entrada - TicketFlow</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>

<body>

<header>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container position-relative">

      <div class="header1">
        <a href="/eventos/{{evento.id}}/entradas" class="flecha">
          🡰
        </a>
        <a class="navbar-brand" href="/">TicketFlow</a>
      </div>

      <span class="navbar-text text-white fs-5 position-absolute top-50 start-50 translate-middle">
        Editar entrada
      </span>

      <a class="btn btn-outline-light position-absolute top-50 end-0 translate-middle-y"
         href="/profile">
        <i class="bi bi-person-circle"></i>
      </a>

    </div>
  </nav>
</header>

<main class="container py-5">

  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h4 class="mb-0">Editar entrada</h4>
    </div>

    <div class="card-body">

      <form action="/entradas/{{entrada.id}}/edit" method="post">
        <input type="hidden" name="_csrf" value="{{_csrf.token}}">
        <div class="mb-3">
          <label class="form-label">Nombre</label>
          <input type="text"
                 class="form-control"
                 name="name"
                 value="{{entrada.name}}"
                 required>
        </div>

        <div class="mb-3">
          <label class="form-label">Descripción</label>
          <textarea class="form-control"
                    name="descripcion"
                    rows="3"
                    required>{{entrada.descripcion}}</textarea>
        </div>

        <div class="mb-3">
          <label class="form-label">Tipo de acceso</label>
          <select class="form-select" name="tipoAcceso">
            <option value="NORMAL">Normal</option>
            <option value="VIP">VIP</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Precio (€)</label>
          <input type="number"
                 class="form-control"
                 name="precio"
                 value="{{entrada.precio}}"
                 required>
        </div>

        <div class="d-flex justify-content-between">

          <a href="/eventos/{{evento.id}}/entradas" class="btn btn-outline-secondary">
            Cancelar
          </a>

          <button type="submit" class="btn btn-primary">
            Guardar cambios
          </button>

        </div>

      </form>

    </div>
  </div>

</main>

{{>partials/footer}}

</body>
</html>
