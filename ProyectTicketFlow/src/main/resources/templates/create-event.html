<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketFlow - Crear Evento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container position-relative">

            <div class="header1">
                <a href="/discotecas/{{discoteca.id}}/eventos" class="flecha">
                    🡰
                </a>
                <a class="navbar-brand" href="/">TicketFlow</a>
            </div>

            <span class="navbar-text text-white fs-5 position-absolute top-50 start-50 translate-middle">
                Registra un evento
            </span>

            <a class="btn btn-outline-light position-absolute top-50 end-0 translate-middle-y"
               href="/profile">
                <i class="bi bi-person-circle"></i>
            </a>

        </div>
    </nav>
</header>

<main class="container py-5">

    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Registra un nuevo evento</h4>
        </div>

        <div class="card-body">
            <form action="/discotecas/{{discoteca.id}}/eventos/create" method="post" enctype="multipart/form-data">
                <input type="hidden" name="_csrf" value="{{token}}">
                <!-- Nombre del evento -->
                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input
                            type="text"
                            class="form-control"
                            name="name"
                            placeholder="Ej: Noche Techno con DJ Marco"
                            required>
                </div>

                <!-- Discoteca fija -->
                <div class="mb-3">
                    <label class="form-label">Discoteca</label>

                    <!-- visible pero no editable -->
                    <input
                            type="text"
                            class="form-control"
                            value="{{discoteca.name}}"
                            disabled>

                    <!-- id real que se envía -->
                    <input type="hidden" name="discotecaId" value="{{discoteca.id}}">
                </div>

                <!-- Descripción -->
                <div class="mb-3">
                    <label class="form-label">Descripción</label>
                    <textarea
                            class="form-control"
                            name="descripcion"
                            rows="3"
                            placeholder="Ej: Una noche de música electrónica con DJs invitados, pista principal abierta hasta las 6 AM y zona VIP disponible."
                            required></textarea>
                </div>

                <!-- Edad requerida -->
                <div class="mb-3">
                    <label class="form-label">Edad requerida</label>
                    <input
                            type="number"
                            class="form-control"
                            name="edadRequerida"
                            min="0"
                            placeholder="Ej: 18"
                            required>
                </div>

                <!-- Imagen -->
                <div class="mb-4">
                    <label class="form-label">Imagen del evento</label>
                    <input
                            type="file"
                            class="form-control"
                            name="imageFile"
                            accept="image/*">
                </div>

                <div class="d-flex justify-content-between">
                    <a href="/discotecas/{{discoteca.id}}/eventos" class="btn btn-outline-secondary">
                        Cancelar
                    </a>

                    <button type="submit" class="btn btn-primary">
                        Crear Evento
                    </button>

                </div>

            </form>
        </div>
    </div>

</main>

{{>partials/footer}}

</body>
</html>
