<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketFlow - Create Event</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container position-relative">

                <div class="header1">
                    <a href="/discotecas/{{discoteca.id}}/eventos" class="flecha">
                        <- </a>
                            <a class="navbar-brand" href="/">TicketFlow</a>
                </div>

                <span class="navbar-text text-white fs-5 position-absolute top-50 start-50 translate-middle">
                    Register an event
                </span>

                <a class="btn btn-outline-light position-absolute top-50 end-0 translate-middle-y" href="/profile">
                    <i class="bi bi-person-circle"></i>
                </a>

            </div>
        </nav>
    </header>

    <main class="container py-5">

        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Register a new event</h4>
            </div>

            <div class="card-body">
                {{#error}}
                <div class="alert alert-danger" role="alert">{{error}}</div>
                {{/error}}
                <form id="createEventForm" action="/discotecas/{{discoteca.id}}/eventos/create" method="post"
                    enctype="multipart/form-data">
                    <input type="hidden" name="_csrf" value="{{token}}">
                    <!-- Event name -->
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" name="name" placeholder="E.g.: Techno Night with DJ Marco"
                            required>
                    </div>

                    <!-- Fixed club -->
                    <div class="mb-3">
                        <label class="form-label">Club</label>

                        <!-- visible but not editable -->
                        <input type="text" class="form-control" value="{{discoteca.name}}" disabled>

                        <!-- actual id that is submitted -->
                        <input type="hidden" name="discotecaId" value="{{discoteca.id}}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" name="descripcion" rows="5"
                            placeholder="E.g.: An electronic music night with guest DJs..." required></textarea>
                    </div>

                    <!-- Required age -->
                    <div class="mb-3">
                        <label class="form-label">Required age</label>
                        <input type="number" class="form-control" name="edadRequerida" min="0" placeholder="E.g.: 18"
                            required>
                    </div>

                    <!-- Image -->
                    <div class="mb-4">
                        <label class="form-label">Event image</label>
                        <input type="file" class="form-control" name="imageFile" accept="image/*">
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="/discotecas/{{discoteca.id}}/eventos" class="btn btn-outline-secondary">
                            Cancel
                        </a>

                        <button type="submit" class="btn btn-primary">
                            Create Event
                        </button>

                    </div>

                </form>
            </div>
        </div>

    </main>

    {{>partials/footer}}


</body>

</html>
