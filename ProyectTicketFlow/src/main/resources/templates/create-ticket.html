<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TicketFlow - Create Ticket</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>

<body>

<header>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container position-relative">

      <div class="header1">
        <!-- Back to tickets -->
        <a href="/eventos/{{evento.id}}/entradas" class="flecha">
          <-
        </a>
        <a class="navbar-brand" href="/">TicketFlow</a>
      </div>

      <span class="navbar-text text-white fs-5 position-absolute top-50 start-50 translate-middle">
                Create ticket
            </span>

      <a class="btn btn-outline-light position-absolute top-50 end-0 translate-middle-y"
         href="/profile">
        <i class="bi bi-person-circle"></i>
      </a>

    </div>
  </nav>
</header>

<main class="container py-5">

  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h4 class="mb-0">Add a new ticket</h4>
    </div>

    <div class="card-body">
      {{#error}}
      <div class="alert alert-danger" role="alert">{{error}}</div>
      {{/error}}
      <form action="/entradas/create-ticket" method="post">
        <input type="hidden" name="_csrf" value="{{token}}" />
        <div class="mb-3">
          <label class="form-label">Event</label>

          <input type="text"
                 class="form-control"
                 value="{{evento.name}}"
                 disabled>

          <input type="hidden" name="eventoId" value="{{evento.id}}">
        </div>

        <!-- Name -->
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text"
                 class="form-control"
                 name="name"
                 placeholder="E.g.: VIP Ticket"
                 required>
        </div>

        <!-- Access -->
        <div class="mb-3">
          <label class="form-label">Access type</label>
          <select class="form-control" name="acceso" required>
            <option value="Normal">Normal</option>
            <option value="VIP">VIP</option>
          </select>
        </div>

        <!-- Includes -->
        <div class="mb-3">
          <label class="form-label">Includes</label>
          <input type="text"
                 class="form-control"
                 name="incluye"
                 placeholder="E.g.: 2 drinks + VIP access"
                 required>
        </div>

        <!-- Price -->
        <div class="mb-4">
          <label class="form-label">Price (€)</label>
          <input type="number"
                 class="form-control"
                 name="precio"
                 step="0.01"
                 min="0"
                 placeholder="E.g.: 25.00"
                 required>
        </div>

        <div class="d-flex justify-content-between">

          <a href="/eventos/{{evento.id}}/entradas" class="btn btn-outline-secondary">
            Cancel
          </a>

          <button type="submit" class="btn btn-primary">
            Create Ticket
          </button>

        </div>

      </form>
    </div>
  </div>

</main>

{{>partials/footer}}

</body>
</html>
