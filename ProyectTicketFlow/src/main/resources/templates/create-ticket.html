<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TicketFlow - Crear Entrada</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>

<body>

<header>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container position-relative">

      <div class="header1">
        <!-- 🔙 Volver a entradas -->
        <a href="/eventos/{{evento.id}}/entradas" class="flecha">
          🡰
        </a>
        <a class="navbar-brand" href="/">TicketFlow</a>
      </div>

      <span class="navbar-text text-white fs-5 position-absolute top-50 start-50 translate-middle">
                Crear entrada
            </span>

      <a class="btn btn-outline-light position-absolute top-50 end-0 translate-middle-y"
         href="/profile">
        <i class="bi bi-person-circle"></i>
      </a>

    </div>
  </nav>
</header>

<main class="container py-5">

  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h4 class="mb-0">Añade una nueva entrada</h4>
    </div>

    <div class="card-body">
      <form action="/entradas/create-ticket" method="post">
        <input type="hidden" name="_csrf" value="{{_csrf.token}}">
        <!-- 🔥 Evento fijo -->
        <div class="mb-3">
          <label class="form-label">Evento</label>

          <input type="text"
                 class="form-control"
                 value="{{evento.name}}"
                 disabled>

          <input type="hidden" name="eventoId" value="{{evento.id}}">
        </div>

        <!-- Nombre -->
        <div class="mb-3">
          <label class="form-label">Nombre</label>
          <input type="text"
                 class="form-control"
                 name="name"
                 placeholder="Ej: Entrada VIP"
                 required>
        </div>

        <!-- Acceso -->
        <div class="mb-3">
          <label class="form-label">Tipo de acceso</label>
          <select class="form-control" name="acceso" required>
            <option value="Normal">Normal</option>
            <option value="VIP">VIP</option>
          </select>
        </div>

        <!-- Incluye -->
        <div class="mb-3">
          <label class="form-label">Incluye</label>
          <input type="text"
                 class="form-control"
                 name="incluye"
                 placeholder="Ej: 2 copas + acceso VIP"
                 required>
        </div>

        <!-- Precio -->
        <div class="mb-4">
          <label class="form-label">Precio (€)</label>
          <input type="number"
                 class="form-control"
                 name="precio"
                 step="0.01"
                 min="0"
                 placeholder="Ej: 25.00"
                 required>
        </div>

        <div class="d-flex justify-content-between">

          <a href="/eventos/{{evento.id}}/entradas" class="btn btn-outline-secondary">
            Cancelar
          </a>

          <button type="submit" class="btn btn-primary">
            Crear Entrada
          </button>

        </div>

      </form>
    </div>
  </div>

</main>

{{>partials/footer}}

</body>
</html>
