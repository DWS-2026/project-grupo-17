<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Denegado - 403</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">TicketFlow</a>
        </div>
    </nav>
</header>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-9 col-lg-7">
            <div class="card shadow border-0">
                <div class="card-body p-4 p-md-5">
                    <p class="display-6 fw-bold text-danger mb-2">403</p>
                    <h1 class="h3 mb-3">Acceso denegado</h1>
                    <p class="text-muted mb-4">
                        No tienes permisos para acceder a este recurso.
                    </p>

                    <div class="alert alert-secondary" role="alert">
                        Posibles causas: no tienes rol de administrador, intentas acceder a un recurso restringido o la sesión ya no tiene permisos válidos.
                    </div>

                    <div class="d-flex gap-2 flex-wrap">
                        <a href="/" class="btn btn-primary">Volver al inicio</a>
                        <a href="javascript:history.back()" class="btn btn-outline-secondary">Volver atrás</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

{{>partials/footer}}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
