<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketFlow - Editar Evento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/styles.css">
    <!-- Quill.js Rich Text Editor -->
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet">
    <style>
        #editor-container {
            height: 200px;
            background: #fff;
        }

        .ql-toolbar.ql-snow {
            background: #f8f9fa;
        }
    </style>
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container position-relative">

                <div class="header1">
                    <a href="/discotecas/{{discoteca.id}}/eventos" class="flecha">
                        <- </a>
                            <a class="navbar-brand" href="/">TicketFlow</a>
                </div>

                <span class="navbar-text text-white fs-5 position-absolute top-50 start-50 translate-middle">
                    Edita el evento
                </span>

                <a class="btn btn-outline-light position-absolute top-50 end-0 translate-middle-y" href="/profile">
                    <i class="bi bi-person-circle"></i>
                </a>

            </div>
        </nav>
    </header>

    <main class="container py-5">

        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Editar evento</h4>
            </div>

            <div class="card-body">
                {{#error}}
                <div class="alert alert-danger" role="alert">{{error}}</div>
                {{/error}}
                <form id="editEventForm" action="/eventos/{{evento.id}}/edit" method="post"
                    enctype="multipart/form-data">
                    <input type="hidden" name="_csrf" value="{{token}}">
                    <input type="hidden" name="eventoId" value="{{evento.id}}">

                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" name="name" value="{{evento.name}}"
                            placeholder="Ej: Noche Techno con DJ Marco" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Discoteca</label>

                        <input type="text" class="form-control" value="{{discoteca.name}}" disabled>

                        <input type="hidden" name="discotecaId" value="{{discoteca.id}}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <!-- Quill editor container -->
                        <div id="editor-container">{{{evento.descripcion}}}</div>
                        <!-- Hidden input that will hold the HTML from Quill -->
                        <input type="hidden" id="descripcion" name="descripcion">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Edad requerida</label>
                        <input type="number" class="form-control" name="edadRequerida" value="{{evento.edadRequerida}}"
                            min="0" placeholder="Ej: 18" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Actualizar imagen del evento</label>
                        <input type="file" class="form-control" name="imageFile" accept="image/*">
                        <div class="form-text">Si no subes ninguna imagen nueva, se mantendrá la imagen actual.</div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="/discotecas/{{discoteca.id}}/eventos" class="btn btn-outline-secondary">
                            Cancelar
                        </a>

                        <button type="submit" class="btn btn-primary">
                            Guardar Cambios
                        </button>

                    </div>

                </form>
            </div>
        </div>

    </main>

    {{>partials/footer}}

    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
    <script>
        var quill = new Quill('#editor-container', {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'color': [] }, { 'background': [] }],
                    [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                    [{ 'align': [] }],
                    ['link'],
                    ['clean']
                ]
            }
        });

        document.getElementById('editEventForm').addEventListener('submit', function (e) {
            var html = quill.root.innerHTML;
            if (html === '<p><br></p>' || html.trim() === '') {
                e.preventDefault();
                alert('La descripción no puede estar vacía.');
                return;
            }
            document.getElementById('descripcion').value = html;
        });
    </script>

</body>

</html>
