<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Entradas - TicketFlow</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

<header>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container position-relative">

      <div class="header1">
        <a href="/profile" class="flecha">
          <-
        </a>
        <a class="navbar-brand" href="/">TicketFlow</a>
      </div>

      <span class="navbar-text text-white fs-5 position-absolute top-50 start-50 translate-middle">
        Mis entradas
      </span>

      <form method="post" action="/logout">
        <input type="hidden" name="_csrf" value="{{token}}" />
        <button type="submit" class="btn btn-outline-danger btn-sm">Cerrar Sesión</button>
      </form>

    </div>
  </nav>
</header>

<main class="container py-5">

  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h4 class="mb-0">Entradas compradas</h4>
    </div>

    <div class="card-body">

      <table class="table table-striped align-middle">
        <thead>
        <tr>
          <th>Nombre</th>
          <th>Tipo</th>
          <th>Incluye</th>
          <th>Precio</th>
          <th>Evento</th>
        </tr>
        </thead>

        <tbody>

        {{#entradas}}
        <tr>
          <td>{{name}}</td>
          <td>{{acceso}}</td>
          <td>{{incluye}}</td>
          <td>{{precio}} €</td>

          <td>
            {{#evento}}
            {{name}}
            {{/evento}}
          </td>
        </tr>
        {{/entradas}}

        {{^entradas}}
        <tr>
          <td colspan="5" class="text-center">
            No tienes entradas compradas
          </td>
        </tr>
        {{/entradas}}

        </tbody>
      </table>

    </div>
  </div>

</main>

{{>partials/footer}}

</body>
</html>
