<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketFlow - Discotecas disponibles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container position-relative">

            <div class="header1">
                <a href="/" class="flecha">🡰</a>
                <a class="navbar-brand" href="/">TicketFlow</a>
            </div>

            <span class="navbar-text text-white fs-5 position-absolute top-50 start-50 translate-middle">
                Discotecas disponibles
            </span>

            <a class="btn btn-outline-light position-absolute top-50 end-0 translate-middle-y"
               href="/profile">
                <i class="bi bi-person-circle"></i>
            </a>

        </div>
    </nav>
</header>


<main class="container py-5">

    <div class="card shadow mb-4">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Listado de discotecas</h5>
        </div>
        <div class="card-body">
            <section class="tabla-eventos">
                <table class="table table-striped align-middle">
                    {{#discotecas}}
                    <tr>
                        <td>
                            <img src="/discotecas/{{id}}/image" class="img-fluid evento-img" alt="{{name}}">
                        </td>
                        <td>{{name}}</td>
                        <td>
                            <a href="/discotecas/{{id}}" class="btn btn-sm btn-info text-white">
                                <i class="bi bi-eye me-1"></i>Ver más
                            </a>
                        </td>
                        <td>
                            <a href="/discotecas/{{id}}/eventos" class="btn btn-sm btn-outline-primary">
                                Eventos disponibles
                            </a>
                        </td>
                        <td>
                            <a href="/discotecas/edit-discoteca/{{id}}" class="btn btn-sm btn-outline-primary">
                                Editar
                            </a>
                        </td>
                        <td>
                            <form action="/discotecas/delete/{{id}}" method="post" style="display:inline;">
                                <button type="submit" class="btn btn-sm btn-danger">Eliminar</button>
                            </form>
                        </td>
                    </tr>
                    {{/discotecas}}
                </table>
            </section>
        </div>
    </div>

    <div>
        <a href="/discotecas/create-discotecas" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>
            Añadir Discoteca
        </a>
    </div>

</main>
{{>partials/footer}}
</body>
</html>
