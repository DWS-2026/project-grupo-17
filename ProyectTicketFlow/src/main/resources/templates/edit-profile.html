<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketFlow - Editar Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container position-relative">
            <div class="header1">
                <a href="/profile" class="flecha">
                    🡰
                </a>
                <a class="navbar-brand" href="/">TicketFlow</a>
            </div>
            <div class="position-absolute start-50 translate-middle-x text-white">
                Editar perfil
            </div>

            <a class="btn btn-outline-light position-absolute top-50 end-0 translate-middle-y"
               href="/profile">
                <i class="bi bi-person-circle"></i>
            </a>

        </div>
    </nav>
</header>

<main class="container py-5">

    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Modificar Datos de Usuario</h4>
        </div>
        <div class="card-body">
            <form method="post" action="/edit-profile" enctype="multipart/form-data">
                <input type="hidden" name="_csrf" value="{{_csrf.token}}">
                <div class="mb-3">
                    <label class="form-label">Nombre Completo</label>
                    <input type="text" name="nombre" class="form-control" value="{{user.nombre}}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" value="{{user.email}}" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Fecha de Nacimiento</label>
                        <input type="date" name="fechaNacimiento" class="form-control" value="{{user.fechaNacimiento}}" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Modificar Avatar</label>
                    <input type="file" name="avatar" class="form-control" accept="image/*">
                </div>

                <div class="d-flex justify-content-between">
                    <a href="/profile" class="btn btn-outline-secondary">
                        Cancelar
                    </a>
                    <button type="submit" class="btn btn-primary">
                        Guardar Cambios
                    </button>
                </div>

            </form>
        </div>
    </div>

</main>

{{>partials/footer}}
</body>
</html>
