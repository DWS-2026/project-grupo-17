<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Club - TicketFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/styles.css">
    <!-- Quill.js Rich Text Editor -->
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet">
    <style>
        #editor-container {
            height: 200px;
            background: #fff;
        }

        .ql-toolbar.ql-snow {
            background: #f8f9fa;
        }
    </style>
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container position-relative">

                <div class="header1">
                    <a href="/discotecas" class="flecha">
                        <- </a>
                            <a class="navbar-brand" href="/">TicketFlow</a>
                </div>

                <span class="navbar-text text-white fs-5 position-absolute top-50 start-50 translate-middle">
                    Edit club
                </span>

                <a class="btn btn-outline-light position-absolute top-50 end-0 translate-middle-y" href="/profile">
                    <i class="bi bi-person-circle"></i>
                </a>

            </div>
        </nav>
    </header>

    <main class="container py-5">

        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Edit club</h4>
            </div>

            <div class="card-body">
                {{#error}}
                <div class="alert alert-danger" role="alert">{{error}}</div>
                {{/error}}
                <form id="editDiscotecaForm" action="/discotecas/edit/{{id}}" method="post"
                    enctype="multipart/form-data">
                    <input type="hidden" name="_csrf" value="{{token}}" />
                    <div class="mb-3">
                        <label class="form-label">Change the name</label>
                        <input type="text" class="form-control" name="name" value="{{discoteca.name}}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Change the address</label>
                        <input type="text" class="form-control" name="calle" value="{{discoteca.calle}}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Change the description </label>
                        <div id="editor-container"></div>
                        <div id="initial-content" style="display:none">{{discoteca.descripcion}}</div>
                        <input type="hidden" id="descripcion" name="descripcion">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Change the club image</label>
                        <input type="file" class="form-control" name="imageFile" accept="image/*">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Change the club flyer (PDF)</label>
                        <input type="file" class="form-control" name="flyerFile" accept="application/pdf">
                        <div class="form-check mt-2">
                            <input class="form-check-input" type="checkbox" name="removeFlyer" id="removeFlyer" value="true">
                            <label class="form-check-label" for="removeFlyer">
                                Remove current flyer
                            </label>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="/discotecas" class="btn btn-outline-secondary">
                            Cancel
                        </a>
                        <button type="submit" class="btn btn-primary">
                            Save Changes
                        </button>
                    </div>

                </form>
            </div>
        </div>

    </main>

    {{>partials/footer}}

    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
    <script>
        var quill = new Quill('#editor-container', {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'color': [] }, { 'background': [] }],
                    [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                    [{ 'align': [] }],
                    ['link'],
                    ['clean']
                ]
            }
        });

        var existingContent = document.getElementById('initial-content').textContent;
        if (existingContent.trim()) {
            quill.clipboard.dangerouslyPasteHTML(existingContent);
        }

        document.getElementById('editDiscotecaForm').addEventListener('submit', function (e) {
            var html = quill.root.innerHTML;
            if (html === '<p><br></p>' || html.trim() === '') {
                e.preventDefault();
                alert('The description cannot be empty.');
                return;
            }
            document.getElementById('descripcion').value = html;
        });
    </script>

</body>

</html>
