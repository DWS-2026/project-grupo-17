<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Evento - TicketFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container position-relative">

            <div class="header1">
                <a href="/discotecas" class="flecha">
                    🡰
                </a>
                <a class="navbar-brand" href="/">TicketFlow</a>
            </div>

            <span class="navbar-text text-white fs-5 position-absolute top-50 start-50 translate-middle">
                Editar discoteca
            </span>

            <a class="btn btn-outline-light position-absolute top-50 end-0 translate-middle-y"
               href="/profile">
                <i class="bi bi-person-circle"></i>
            </a>

        </div>
    </nav>
</header>

<main class="container py-5">

    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Editar discoteca</h4>
        </div>

        <div class="card-body">
            <form action="/discotecas/edit/{{id}}" method="post" enctype="multipart/form-data">

                <div class="mb-3">
                    <label class="form-label">Cambia el nombre</label>
                    <input type="text" class="form-control" name="name" value="{{discoteca.name}}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Cambia la dirección</label>
                    <input type="text" class="form-control" name="calle" value="{{discoteca.calle}}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Cambia la descripción</label>
                    <textarea class="form-control" name="descripcion" rows="4" required>{{discoteca.descripcion}}</textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label">Cambia la imagen de la discoteca</label>
                    <input type="file" class="form-control" name="image" accept="image/*">
                </div>

                <div class="d-flex justify-content-between">
                    <a href="/discotecas" class="btn btn-outline-secondary">
                        Cancelar
                    </a>
                    <button type="submit" class="btn btn-primary">
                        Guardar Cambios
                    </button>
                </div>

            </form>
        </div>
    </div>

</main>

{{>partials/footer}}

</body>
</html>
