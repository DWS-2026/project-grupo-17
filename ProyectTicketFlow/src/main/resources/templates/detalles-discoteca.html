<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketFlow - Detalle de Discoteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container position-relative">

            <div class="header1">
                <a href="/discotecas" class="flecha"><-</a>
                <a class="navbar-brand" href="/">TicketFlow</a>
            </div>

            <span class="navbar-text text-white fs-5 position-absolute top-50 start-50 translate-middle">
                Detalle de Discoteca
            </span>

            <a class="btn btn-outline-light position-absolute top-50 end-0 translate-middle-y"
               href="/profile">
                <i class="bi bi-person-circle"></i>
            </a>

        </div>
    </nav>
</header>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <img src="/discotecas/{{discoteca.id}}/image" class="card-img-top" alt="{{discoteca.name}}" style="max-height: 400px; object-fit: cover;">
                
                <div class="card-body text-center mt-3">
                    <h2 class="card-title text-primary mb-3">{{discoteca.name}}</h2>
                    
                    <p class="card-text text-muted fs-5 mb-4">
                        <i class="bi bi-geo-alt-fill text-danger me-2"></i><strong>Dirección:</strong> {{discoteca.calle}}
                    </p>
                    
                    <hr>
                    
                    <div class="text-start mt-4">
                        <h5 class="fw-bold">Sobre nosotros</h5>
                        <div class="card-text mt-2 rich-text-content">
                            {{{discoteca.descripcion}}}
                        </div>
                    </div>

                    {{#discoteca.flyer}}
                    <div class="text-start mt-4">
                        <h5 class="fw-bold">Flyer Oficial</h5>
                        <a href="/discotecas/{{discoteca.id}}/flyer" class="btn btn-outline-info" target="_blank">
                            <i class="bi bi-download"></i> Descargar / Ver Flyer ({{discoteca.flyer}})
                        </a>
                    </div>
                    {{/discoteca.flyer}}
                </div>
                
                <div class="card-footer bg-light text-center py-3">
                    <a href="/discotecas/{{id}}/eventos" class="btn btn-primary">
                        <i class="bi bi-calendar-event me-1"></i> Ver eventos disponibles
                    </a>
                    <a href="/discotecas" class="btn btn-outline-secondary ms-2">
                        Volver al listado
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

{{>partials/footer}}
</body>
</html>
